# GoReleaser config — cross-compiles ctk and publishes a Homebrew formula.
# Release flow:  git tag v0.1.0 && git push --tags && goreleaser release --clean
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ctk
    main: .
    binary: ctk
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [darwin, linux]
    goarch: [amd64, arm64]

archives:
  - id: ctk
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Publishes a Homebrew CASK to github.com/AbhayShalghar/homebrew-tap (under Casks/)
# so macOS users can: brew install AbhayShalghar/tap/ctk
# Casks are macOS-only; Linux users grab ctk_linux_*.tar.gz from the release.
# The post-install hook strips the Gatekeeper quarantine so the unsigned binary runs.
homebrew_casks:
  - name: ctk
    binaries:
      - ctk
    repository:
      owner: AbhayShalghar
      name: homebrew-tap
      branch: main
    homepage: "https://github.com/AbhayShalghar/ctk"
    description: "Context Token Killer — compresses Claude Code tool output (MCP, native tools, Bash)"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/ctk"]
          end

release:
  draft: false
